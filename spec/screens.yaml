# screens.yaml — 経営統合システム 画面インベントリ（正本）
# ルール:
#  - ここに載っていない画面は存在しない。孤立画面（どこからも to: されない画面）はドリフトとして検知する。
#  - to: には正常系だけでなく「失敗・差戻し・キャンセル」の行き先を必ず書く。
#  - 進捗列: kanpu(カンプ) / mapping(対応表) / impl(実装) / accepted(検収) を "-" → "v" で更新（Gate 1で更新）。
#  - nav: main=主サイドバー / admin=設定モードのサイドバー / none=ナビ非表示（外部・詳細画面）
# 未確定の前提は assumption-ledger.md の A-xx を参照。

meta:
  project: 経営統合システム（Initial State）
  version: v0.3
  date: 2026-07-19
  changelog_v0.2: Z-01解決＝案件詳細(E-04)を新設。E-02案件カード・E-03案件クリックの遷移先をE-04へ。
                  A-07=不要（ルールは使用箇所にインライン）／A-08=バンドル外維持で確定。
  changelog_v0.3: A-03確定（販売パイプライン10ステージ・遷移ルール）→E-03/E-04でステータス実装・遷移UI・「（仮）」撤去。
                  補助金の交付/実績/事業化フェーズを「成約後の履行管理」として別軸に分離（概念分離まで・2つ目の状態機械は作らない）。
                  Z-06=主表示IS番号/Deal IDは結合キー(data-deal-id)。rules二層＝編集ST-02(st02_rules.html)/閲覧rules.html(rules_view)。
                  A-01/A-02確定反映。Z-02〜06クローズ。A-09/A-10（会社独自ルール・給与手当計算）はv0.4。
  gate1_v0.3: 2026-07-20 実装後Gate1。全画面 kanpu=v。E-03/E-04ステータス実装。conformance参照。
  changelog_v0.4: Pillar A＝営業管理（獲得）／案件管理（履行）の2エリア分離。consult-status.state.mmd新設。E-05新設・E-04 2軸＋売上経費。
  changelog_v0.4.1: 案件管理を種別別の独立ステータスに（E-05タブ＝レポート/BPO/補助金助成金/その他・各独自ステージ）。
                    BPO(親)⇔補助金助成金(子)を Deal ID 関連で 1:N（A-14）。会社詳細/案件詳細は種別で分けず束ねる。
                    営業＝ボード＋テーブルの2表示＋種別セグメント＋当月成約＋畳める分岐終端（キャンセル追加）。命名：営業案件→営業／案件（履行）→案件。
  note: 旧ナビからの変更＝「業務」カテゴリ廃止 / 経理を「経理処理」「経営管理」に分離(A-01) /
        会社・案件を「営業」配下へ / 文書・ルール・予算設計・顧客ポータル管理を設定(admin)へ移設 /
        ロゴは Initial State のみ（Bizplan 削除）

nav_structure:
  main:
    - ホーム: [H-01]
    - 営業管理: [E-01, E-02, E-03]        # v0.4 Pillar A: 獲得（lead→契約締結）。E-02会社詳細はパンくず到達
    - 案件管理: [E-05, E-04]              # v0.4 Pillar A: 履行（役務進行＋請求入金＋売上経費）。E-04案件詳細はパンくず到達
    - 経理処理: [K-01, K-02]
    - 経営管理: [M-01, M-02, M-03]
    - 人事: [J-01, J-02, J-03]            # 配置は A-02（確定）
    - 設定: adminモードを開く（ページ遷移ではない。CLAUDE.md §2-1）
  admin:                                   # 設定モードのサイドバー
    - [ST-01, ST-02, ST-03, ST-04, ST-05, ST-06, ST-07]
  external:
    - [P-01]                               # 顧客ポータル（LIFF）。社内ナビには出さない

screens:

  # ---- ホーム ----
  - id: H-01
    name: ホーム
    nav: main
    role: 全ロール（表示内容はロール別）
    alerts: バッジ数は本画面内カードと1対1（CLAUDE.md §2-2 / Q9）。
            内訳=承認待ち・入金漏れ・支払処理・入金消込。バッジクリックで該当カードへ。
    to:
      承認カード: K-01
      入金漏れカード: K-02
      本日の予定: E-02   # 該当会社の詳細へ
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}   # 既存モックを改修

  # ---- 営業管理（獲得：lead→契約締結）----
  - id: E-01
    name: 会社一覧（顧客管理）
    nav: main
    to:
      行クリック: E-02
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: E-02
    name: 会社詳細
    nav: main
    note: 文書・議事録・契約は本画面内の文脈で参照（CLAUDE.md §2-3）。
          # Gate1(v0.1): bento整列崩れ(Q3)は共通12colへ載せ替え是正済み。ポータル発行UIはST-04へ集約。
          # Gate1(v0.2): 案件カードの遷移先をE-04へ張替済み（旧=deals）。
    to:
      案件カード: E-04
      ポータルプレビュー: ST-04
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: E-03
    name: 営業（獲得パイプライン）        # サイドバー項目名＝「営業」（v0.4.1命名）
    nav: main   # 営業管理エリア
    tabs: [ボード, テーブル]   # v0.4.1: 2表示のみ（レポート/BPタブ廃止）。全タブ有効（CLAUDE.md §2-4）
          # Gate1(v0.4.1): 種別セグメント（レポート/BPO/補助金助成金/その他）でボード・テーブルをフィルタ。
          #   成約列は当月分のみ・以前の成約は畳み（details）。分岐終端（失注/長期リード/ニーズなし/破棄/キャンセル）は畳んで参照可。
    state_ref: domain/anken-status.state.mmd          # 販売パイプライン（10＋キャンセル）
    to:
      案件クリック: E-04
      ステータス更新: E-03       # 許可遷移のみ・成功応答後に反映
      ステータス更新失敗: E-03   # 失敗時は同画面にエラー表示・楽観更新禁止
      履行へ: E-05
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 案件管理（履行：契約後の役務進行＋請求入金＋売上経費）----
  - id: E-05
    name: 案件（種別別・履行）           # サイドバー項目名＝「案件」（v0.4.1命名）
    nav: main   # 案件管理エリアの入口
    role: 営業・経営・管理（顧客は不可）
    tabs: [レポート, BPO, 補助金助成金, その他]   # v0.4.1: 種別ごとの独立ステータスビュー（混在テーブル廃止）
    note: |
      契約後の履行を種別別の独自ステータスで管理（他種別のステージを混ぜない）。KPI＝コンサル＝採択金額／入金。
      # Gate1(v0.4.1): レポート=受注→制作→納品→完了／BPO=実施中→完了（受給同額A-13）／
      #   補助金助成金=consult-status.state.mmd／その他=案件発生→実施→完了。
      #   補助金助成金は BPO(親) に紐付く子案件（Deal ID関連 1:N・A-14）。役務更新UI＝window.openConsult / window.openStage。
    state_ref: domain/consult-status.state.mmd   # 補助金助成金の正。他種別は軽量状態（app.js STAGEMAPS）
    to:
      案件クリック: E-04
      役務更新: E-05         # 前進のみ・成功応答後に反映（楽観更新なし）。採択＝成果報酬の請求トリガー
      役務更新失敗: E-05
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  - id: E-04
    name: 案件詳細（2軸）
    nav: main   # 詳細画面（パンくずで到達。案件管理エリア）
    role: 営業・経営・管理（顧客は不可）
    note: |
      1案件を回す作業画面。主キー=HubSpot Deal ID（表示はIS番号）。会社詳細(E-02)がハブ、本画面が作業単位。
      # Gate1(v0.4): 2軸表示。お金軸＝契約締結→着手金→成果報酬（採択後）。役務軸＝consult-status.state.mmd（着手→…→完了）。
      #   連動：採択（役務）→成果報酬の請求（お金）。売上・経費・粗利＝案件別（正本＝freee/管理会計Excel・コンサル帰属）。
      #   主表示=IS番号／Deal IDは data-deal-id＋副次（Z-06）。タスク＝P-01の社内側。役務更新UI＝window.openConsult。
    contains:
      - 案件サマリー（IS番号＝主表示／Deal ID＝結合キー・種別・部門=コンサル・担当＝TimeRex）
      - 親子紐付け（補助金子案件→親BPOへのリンク・親の受給目標×2との関係注記。A-14・1:N）
      - お金軸（契約締結→着手金→成果報酬。着手金=契約時／成果報酬=採択後）
      - 役務軸（consult-status.state.mmd・前進のみ・楽観更新なし）
      - 売上・経費・粗利（案件別。売上=着手金+成果報酬／原価=営業紹介料+現場人件費／外注費分類=営業紹介料は原価・管理外注は販管費）
      - タスク（いまお願いしていること＝P-01の社内側）
      - 契約（GreatSign状態）／議事録（Notta リンク）
    state_ref: domain/consult-status.state.mmd
    to:
      会社リンク: E-02
      ポータルプレビュー: ST-04   # この案件のポータルをプレビュー
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 経理処理 ----
  - id: K-01
    name: 支払処理
    nav: main
    write: true                     # → screens/K-01/acceptance.feature 必須
    note: # Gate1(v0.2 D-3/A-07): 50万円しきい値は本画面にインライン表示（単体ルール画面は作らない）。
    to:
      承認: K-01
      差戻し: K-01                  # 差戻し理由の入力を必須とする
      経営会議承認へ回付: H-01     # 50万円以上（ルールの正は ST-02 で管理）
      承認API失敗: K-01
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: K-02
    name: 入金消込
    nav: main
    write: true
    to:
      消込完了: K-02
      消込失敗_金額不一致: K-02    # 差額を明示し催促フローへ
      催促依頼: H-01               # 担当者のホームにアラートとして出す
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 経営管理 ----
  - id: M-01
    name: 経営サマリー
    nav: main
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: M-02
    name: 予算・実績（閲覧）
    nav: main
    note: 閲覧のみ。編集は ST-01（A-01 仮決め）
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: M-03
    name: キャッシュフロー
    nav: main
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 人事 ----（配置 A-02 仮）
  - id: J-01
    name: 勤怠
    nav: main
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: J-02
    name: 給与・報酬明細
    nav: main
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: J-03
    name: 評価・賞与
    nav: main
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 設定（adminモード）----
  - id: ST-01
    name: 予算設計（編集）
    nav: admin
    write: true
    to: {保存: ST-01, 保存失敗: ST-01, 破棄: M-02}
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: ST-02
    name: ルール編集（編集エンジン＝値の正本）
    nav: admin
    write: true
    file: st02_rules.html    # Gate1(v0.3): 編集はここ。閲覧の運用ルール集は rules.html（A-11/Z-05・rules二層）
    note: しきい値・請求タイミング・評価基準の値の正本。A-09会社独自ルール／A-10給与手当計算はv0.4（本画面は枠まで）。
    to: {保存: ST-02, 保存失敗: ST-02}
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  # 参照物（screens.yaml の画面ではない・孤立扱いにしない）:
  #   rules.html = 運用ルール集（閲覧専用・data-page=rules_view）。値は ST-02 を参照描画（A-11）。
  #   login/index/styleguide = バンドル外維持（A-08）。
  - id: ST-03
    name: 文書テンプレート
    nav: admin
    write: true
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: ST-04
    name: 顧客ポータル管理
    nav: admin
    write: true
    note: 会社・案件ごとにプレビュー必須。配信は LINE LIFF（A-04）。
    to:
      プレビュー: P-01            # プレビューモードで開く
      発行: ST-04
      発行失敗: ST-04
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: ST-05
    name: 権限・ユーザー
    nav: admin
    write: true
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: ST-06
    name: マスタ（会社・勘定科目等）
    nav: admin
    write: true
    note: 正本は外部（HubSpot/freee）。ここは表示名・紐づけの管理のみ（CLAUDE.md §1-1）
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
  - id: ST-07
    name: 連携設定（freee / HubSpot / board / GreatSign / LINE LIFF）
    nav: admin
    write: true
    to: {接続テスト成功: ST-07, 接続テスト失敗: ST-07}
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}

  # ---- 外部（顧客向け）----
  - id: P-01
    name: 顧客ポータル（LIFF）
    nav: none
    role: 顧客（LINE経由・体感ログイン不要）
    note: 契約案件ごとに「いまお願いしていること」「次回予定」を表示（A-05）。
          起動パラメータで会社・案件を特定（A-04）。
    to:
      閲覧のみ: P-01              # 書き込みなし（第1フェーズ）
    progress: {kanpu: v, mapping: "-", impl: "-", accepted: "-"}
